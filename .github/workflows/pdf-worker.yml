name: PDF Extraction

on:
workflow_dispatch:
schedule:
- cron: '10 20 * * *'

jobs:
extract:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20

  - run: npm install

  - run: node pdf-worker.js
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
